name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            autoconf automake libtool-bin pkg-config \
            zlib1g-dev cmake libffi-dev libssl-dev \
            lld

      - name: Install Python dependencies
        run: |
          pip install buildozer cython

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-ubuntu22-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-ubuntu22-

      - name: Build APK
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export ACLOCAL_PATH="/usr/share/aclocal"
          buildozer android debug 2>&1 | tee build.log

      - name: Find APK
        run: |
          echo "=== Looking for APK ==="
          find . -name "*.apk" -type f 2>/dev/null
          ls -la bin/ 2>/dev/null || echo "No bin dir"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: translator-apk
          path: |
            bin/*.apk
            **/*.apk

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
